---

apt_packages:
  - bat
  - build-essential
  - curl
  - wget
  - gh
  - htop
  - neofetch
  - tmux
  - tree
  - ripgrep
  - vim

brew:
  taps:
    - homebrew/bundle
    - homebrew/cask-fonts

  casks:
    - 1password
    - 1password-cli
    - alfred
    - discord
    - firefox
    - google-chrome
    - hiddenbar
    - iina
    - karabiner-elements
    - monitorcontrol
    - notion
    - obsidian
    - onedrive
    - pycharm
    - slack
    - spotify
    - wezterm

  formulae:
    - awscli
    - bat
    - curl
    - eza
    - fd
    - ffmpeg
    - fzf
    - gh
    - htop
    - lazygit
    - neofetch
    - npm
    - koekeishiya/formulae/skhd
    - tmux
    - tree
    - ripgrep
    - wget
    - koekeishiya/formulae/yabai

dotfiles:
  repo: 'https://github.com/alex-bue/dotfiles'
  branch: 'main'

neovim:
  build_from_source: true
  directory: "{{ ansible_user_dir }}/dev/repository/github.com/neovim/neovim"
  build_dependencies:
    - autoconf
    - automake
    - cmake
    - curl
    - doxygen
    - g++
    - gettext
    - libtool
    - libtool-bin
    - ninja-build
    - pkg-config
    - unzip
