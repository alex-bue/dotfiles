---

- name: "install"
  community.general.homebrew:
    name: zsh
  when: ansible_os_family == "Darwin"
  tags: homebrew

- name: "install"
  become: true
  ansible.builtin.apt:
    name: zsh
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- block:
  - name: "obtain path to zsh"
    ansible.builtin.command: which zsh
    register: zsh_path
    changed_when: false

  - name: "change default shell to zsh"
    become: true
    ansible.builtin.user:
      name: '{{ ansible_user }}'
      shell: '{{ zsh_path.stdout }}'

  tags: zsh_chsh

# PLUGINS
- block:
    - name: "create zsh config dir"
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/zsh"
        state: directory
        mode: '0700'

    - name: "obtain path to zsh"
      ansible.builtin.command: which zsh
      register: zsh_path
      changed_when: false
      check_mode: false

    - name: "create zsh_plugins directory"
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins"
        state: directory
        mode: '0755'

    # Powerlevel10k
    - name: "clone powerlevel10k"
      git:
        repo: 'https://github.com/romkatv/powerlevel10k.git'
        dest: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins/powerlevel10k"
        version: HEAD
        clone: true
        update: true
        force: true

    # zsh-autosuggestions
    - name: "clone zsh-autosuggestions"
      git:
        repo: 'https://github.com/zsh-users/zsh-autosuggestions.git'
        dest: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins/zsh-autosuggestions"
        version: HEAD
        clone: true
        update: true
        force: true

    # zsh-syntax-highlighting
    - name: "clone zsh-syntax-highlighting"
      git:
        repo: 'https://github.com/zsh-users/zsh-syntax-highlighting.git'
        dest: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins/zsh-syntax-highlighting"
        version: HEAD
        clone: true
        update: true
        force: true

    # fzf
    - name: "clone fzf"
      git:
        repo: 'https://github.com/junegunn/fzf.git'
        dest: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins/fzf"
        version: HEAD
        clone: true
        update: true
        force: true

    - name: "install fzf"
      ansible.builtin.shell:
        cmd: "./install --key-bindings --completion --no-update-rc"
        chdir: "{{ ansible_user_dir }}/.config/zsh/zsh_plugins/fzf"

  tags: zsh_config



